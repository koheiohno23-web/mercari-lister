<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メルカリ出品アシスタント</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

        :root {
            --bg:#f6f7f9;
            --surface:#ffffff;
            --surface2:#f0f2f5;
            --border:#e2e5ea;
            --accent:#ff4d4d;
            --accent2:#ff8c42;
            --text:#1c1d21;
            --muted:#8a8f99;
            --success:#1eb866;
            --warning:#e0a312;
        }

        * { box-sizing:border-box; margin:0; padding:0; }

        body {
            background:var(--bg);
            color:var(--text);
            font-family:'Noto Sans JP',sans-serif;
            min-height:100vh;
            padding:0 0 80px;
        }

        header {
            background:linear-gradient(135deg,#ffffff 0%,#f6f7f9 60%);
            border-bottom:1px solid var(--border);
            padding:16px 20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            position:sticky;
            top:0;
            z-index:100;
            backdrop-filter:blur(10px);
        }

        header h1 {
            font-family:'Bebas Neue',sans-serif;
            font-size:24px;
            letter-spacing:2px;
            background:linear-gradient(90deg,var(--accent),var(--accent2));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .badge {
            background:var(--accent);
            color:white;
            font-size:9px;
            font-weight:700;
            padding:2px 6px;
            border-radius:20px;
            letter-spacing:1px;
        }

        .tabs {
            display:flex;
            border-bottom:1px solid var(--border);
            background:var(--surface);
        }

        .tab-btn {
            flex:1;
            padding:13px 0;
            font-family:'Noto Sans JP',sans-serif;
            font-size:13px;
            font-weight:500;
            color:var(--muted);
            background:transparent;
            border:none;
            cursor:pointer;
            border-bottom:2px solid transparent;
            transition:all 0.2s;
        }

        .tab-btn.active {
            color:var(--accent);
            border-bottom-color:var(--accent);
        }

        .tab-panel { display:none; }
        .tab-panel.active { display:flex; flex-direction:column; }

        .main {
            max-width:680px;
            margin:0 auto;
            padding:20px 16px;
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        .product-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:16px;
            overflow:hidden;
            transition:border-color 0.2s;
        }

        .product-card.generating { border-color:var(--accent2); }
        .product-card.done { border-color:var(--success); }

        .card-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:12px 14px;
            background:var(--surface2);
            border-bottom:1px solid var(--border);
            cursor:pointer;
            user-select:none;
        }

        .card-header-left { display:flex; align-items:center; gap:10px; }

        .card-num {
            font-family:'Bebas Neue',sans-serif;
            font-size:18px;
            color:var(--accent);
            letter-spacing:1px;
            width:28px;
        }

        .card-title-preview { font-size:13px; font-weight:500; color:var(--text); }
        .card-title-preview.empty { color:var(--muted); }

        .card-header-right { display:flex; align-items:center; gap:8px; }

        .card-status {
            font-size:10px;
            font-weight:700;
            padding:2px 8px;
            border-radius:20px;
            letter-spacing:1px;
        }

        .card-status.idle {
            background:var(--surface);
            color:var(--muted);
            border:1px solid var(--border);
        }

        .card-status.gen {
            background:rgba(255,140,66,0.15);
            color:var(--accent2);
            border:1px solid rgba(255,140,66,0.3);
        }

        .card-status.ok {
            background:rgba(61,220,132,0.12);
            color:var(--success);
            border:1px solid rgba(61,220,132,0.3);
        }

        .card-chevron { font-size:12px; color:var(--muted); transition:transform 0.2s; }
        .card-chevron.open { transform:rotate(180deg); }

        .delete-card-btn {
            background:transparent;
            border:none;
            color:var(--muted);
            font-size:14px;
            cursor:pointer;
            padding:2px 4px;
            line-height:1;
        }
        .delete-card-btn:hover { color:var(--accent); }

        .card-body { padding:14px; display:flex; flex-direction:column; gap:12px; }
        .card-body.collapsed { display:none; }

        .upload-mini {
            border:2px dashed var(--border);
            border-radius:12px;
            padding:16px 14px;
            text-align:center;
            cursor:pointer;
            transition:all 0.2s;
            background:var(--bg);
            position:relative;
        }
        .upload-mini:hover { border-color:var(--accent); }
        .upload-mini p { color:var(--muted); font-size:12px; }
        .upload-mini strong { color:var(--accent); }

        .preview-grid {
            display:grid;
            grid-template-columns:repeat(5,1fr);
            gap:6px;
            margin-top:10px;
        }

        .preview-item {
            aspect-ratio:1;
            border-radius:7px;
            overflow:hidden;
            position:relative;
            border:1px solid var(--border);
        }
        .preview-item img { width:100%; height:100%; object-fit:cover; }

        .remove-btn {
            position:absolute;
            top:2px;
            right:2px;
            background:rgba(0,0,0,0.75);
            border:none;
            color:white;
            border-radius:50%;
            width:18px;
            height:18px;
            font-size:10px;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
        .fg { display:flex; flex-direction:column; gap:4px; }
        .fg label { font-size:10px; color:var(--muted); font-weight:500; }

        select, input[type="text"], input[type="number"], input[type="password"] {
            background:var(--surface2);
            border:1px solid var(--border);
            border-radius:8px;
            color:var(--text);
            font-family:'Noto Sans JP',sans-serif;
            font-size:13px;
            padding:8px 10px;
            width:100%;
            transition:border-color 0.2s;
            -webkit-appearance:none;
        }

        select:focus, input:focus { outline:none; border-color:var(--accent); }
        select option { background:var(--surface2); }

        .price-wrap { position:relative; }
        .price-wrap span {
            position:absolute;
            left:10px;
            top:50%;
            transform:translateY(-50%);
            color:var(--muted);
            font-size:12px;
            pointer-events:none;
        }
        .price-wrap input { padding-left:22px; }

        .result-area {
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:10px;
            overflow:hidden;
            animation:fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from{opacity:0;transform:translateY(6px)}
            to{opacity:1;transform:translateY(0)}
        }

        .result-row { padding:10px 12px; border-bottom:1px solid var(--border); }
        .result-row:last-child { border-bottom:none; }

        .result-row-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:6px;
        }

        .result-label {
            font-size:9px;
            font-weight:700;
            letter-spacing:2px;
            color:var(--accent);
            text-transform:uppercase;
        }

        .result-value {
            font-size:13px;
            line-height:1.8;
            color:var(--text);
            white-space:pre-wrap;
            word-break:break-word;
        }

        .char-count { font-size:10px; color:var(--muted); }
        .char-count.over { color:var(--accent); }

        .copy-xs {
            background:transparent;
            border:1px solid var(--border);
            border-radius:5px;
            color:var(--muted);
            font-family:'Noto Sans JP',sans-serif;
            font-size:10px;
            padding:3px 8px;
            cursor:pointer;
            transition:all 0.15s;
        }
        .copy-xs:hover { border-color:var(--accent); color:var(--text); }
        .copy-xs.copied { border-color:var(--success); color:var(--success); }

        .hashtag-wrap { display:flex; flex-wrap:wrap; gap:5px; }

        .tag-pill {
            background:rgba(255,77,77,0.1);
            border:1px solid rgba(255,77,77,0.2);
            border-radius:20px;
            padding:3px 9px;
            font-size:11px;
            color:#ff9090;
        }

        .card-actions { display:flex; gap:8px; }

        .copy-all-xs {
            flex:1;
            padding:10px;
            background:transparent;
            border:1px solid var(--accent);
            border-radius:8px;
            color:var(--accent);
            font-family:'Noto Sans JP',sans-serif;
            font-size:12px;
            font-weight:500;
            cursor:pointer;
            transition:all 0.15s;
        }
        .copy-all-xs:hover { background:rgba(255,77,77,0.08); }

        .sheets-xs {
            flex:1;
            padding:10px;
            background:rgba(61,220,132,0.08);
            border:1px solid rgba(61,220,132,0.3);
            border-radius:8px;
            color:var(--success);
            font-family:'Noto Sans JP',sans-serif;
            font-size:12px;
            font-weight:500;
            cursor:pointer;
            transition:all 0.15s;
        }
        .sheets-xs:hover { background:rgba(61,220,132,0.15); }
        .sheets-xs:disabled { opacity:0.4; cursor:not-allowed; }

        .gen-spinner {
            display:flex;
            align-items:center;
            gap:10px;
            padding:14px;
            color:var(--muted);
            font-size:13px;
        }

        .spin {
            width:16px;
            height:16px;
            border:2px solid var(--border);
            border-top-color:var(--accent2);
            border-radius:50%;
            animation:spin 0.7s linear infinite;
            flex-shrink:0;
        }

        @keyframes spin { to{transform:rotate(360deg)} }

        .add-product-btn {
            width:100%;
            padding:14px;
            background:transparent;
            border:2px dashed var(--border);
            border-radius:14px;
            color:var(--muted);
            font-family:'Noto Sans JP',sans-serif;
            font-size:14px;
            cursor:pointer;
            transition:all 0.2s;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px;
        }
        .add-product-btn:hover { border-color:var(--accent); color:var(--accent); }

        .bulk-btn {
            width:100%;
            padding:15px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            border:none;
            border-radius:12px;
            color:white;
            font-family:'Bebas Neue',sans-serif;
            font-size:20px;
            letter-spacing:3px;
            cursor:pointer;
            transition:all 0.2s;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
        }
        .bulk-btn:hover { transform:translateY(-1px); filter:brightness(1.1); }
        .bulk-btn:active { transform:translateY(0); }
        .bulk-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; filter:none; }

        .error-msg {
            background:rgba(255,77,77,0.1);
            border:1px solid rgba(255,77,77,0.3);
            border-radius:10px;
            padding:10px 14px;
            font-size:13px;
            color:#ff8080;
            display:none;
        }

        .progress-wrap {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:10px;
            padding:12px 14px;
            display:none;
        }

        .progress-label { font-size:12px; color:var(--muted); margin-bottom:8px; }

        .progress-bar-bg {
            background:var(--surface2);
            border-radius:20px;
            height:6px;
            overflow:hidden;
        }

        .progress-bar-fill {
            height:100%;
            background:linear-gradient(90deg,var(--accent),var(--accent2));
            border-radius:20px;
            transition:width 0.4s ease;
            width:0%;
        }

        .sync-btn {
            background:rgba(61,220,132,0.1);
            border:1px solid rgba(61,220,132,0.35);
            border-radius:8px;
            color:var(--success);
            font-family:'Noto Sans JP',sans-serif;
            font-size:12px;
            font-weight:500;
            padding:7px 12px;
            cursor:pointer;
            transition:all 0.15s;
            white-space:nowrap;
        }
        .sync-btn:hover { background:rgba(61,220,132,0.18); }
        .sync-btn:disabled { opacity:0.5; cursor:not-allowed; }

        .listing-list {
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:12px;
            align-items:start;
        }
        @media (max-width:760px) {
            .listing-list { grid-template-columns:repeat(2,1fr); }
        }
        @media (max-width:480px) {
            .listing-list { grid-template-columns:1fr; }
        }

        .listing-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:14px;
            overflow:hidden;
        }

        .lc-thumb {
            width:100%;
            aspect-ratio:1;
            object-fit:cover;
            display:block;
            background:var(--surface2);
            border-bottom:1px solid var(--border);
        }
        .lc-thumb-placeholder {
            width:100%;
            aspect-ratio:1;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:32px;
            color:var(--muted);
            background:var(--surface2);
            border-bottom:1px solid var(--border);
        }

        .lc-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:11px 14px;
            background:var(--surface2);
            border-bottom:1px solid var(--border);
            gap:8px;
        }

        .lc-title { font-size:13px; font-weight:500; flex:1; line-height:1.4; }

        .status-badge {
            font-size:10px;
            font-weight:700;
            padding:3px 9px;
            border-radius:20px;
            letter-spacing:1px;
            white-space:nowrap;
        }

        .status-selling {
            background:rgba(255,209,102,0.15);
            color:var(--warning);
            border:1px solid rgba(255,209,102,0.3);
        }

        .status-sold {
            background:rgba(61,220,132,0.12);
            color:var(--success);
            border:1px solid rgba(61,220,132,0.3);
        }

        .lc-body { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }

        .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

        .report-month-bar {
            display:flex;
            align-items:center;
            justify-content:center;
            gap:16px;
            margin:6px 0 4px;
        }
        .report-nav-btn {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:8px;
            color:var(--text);
            font-size:14px;
            width:36px;
            height:36px;
            cursor:pointer;
            transition:all 0.15s;
        }
        .report-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
        .report-month-label {
            font-family:'Bebas Neue',sans-serif;
            font-size:22px;
            letter-spacing:1px;
            min-width:140px;
            text-align:center;
        }
        .stat-grid {
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:12px;
        }
        .stat-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:14px;
            padding:16px 14px;
            display:flex;
            flex-direction:column;
            gap:6px;
        }
        .stat-card.highlight {
            grid-column:1 / -1;
            background:linear-gradient(135deg,rgba(255,77,77,0.06),rgba(255,140,66,0.06));
            border-color:rgba(255,140,66,0.3);
        }
        .stat-label { font-size:11px; color:var(--muted); font-weight:500; letter-spacing:0.5px; }
        .stat-value {
            font-family:'Bebas Neue',sans-serif;
            font-size:30px;
            letter-spacing:1px;
            line-height:1;
        }
        .stat-value.pos { color:var(--success); }
        .stat-value.neg { color:var(--accent); }
        .stat-unit { font-size:13px; color:var(--muted); margin-left:3px; }

        .ic { display:flex; flex-direction:column; gap:3px; }
        .ic-label { font-size:10px; color:var(--muted); }
        .ic-value { font-size:14px; font-weight:500; }
        .ic-value.pos { color:var(--success); }
        .ic-value.neg { color:var(--accent); }

        .sold-section { border-top:1px solid var(--border); padding-top:10px; }

        .sold-title {
            font-size:10px;
            color:var(--muted);
            font-weight:700;
            letter-spacing:1px;
            text-transform:uppercase;
            margin-bottom:8px;
        }

        .sold-row { display:flex; gap:8px; align-items:flex-end; }

        .sold-input-w { flex:1; display:flex; flex-direction:column; gap:4px; }
        .sold-input-w label { font-size:11px; color:var(--muted); }

        .sold-btn {
            background:var(--success);
            border:none;
            border-radius:8px;
            color:#0d0d0f;
            font-family:'Noto Sans JP',sans-serif;
            font-size:13px;
            font-weight:700;
            padding:10px 14px;
            cursor:pointer;
            white-space:nowrap;
        }
        .sold-btn:hover { filter:brightness(1.1); }

        .sold-result-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }

        .sales-search-bar {
            position:relative;
            display:flex;
            align-items:center;
            margin:10px 0 6px;
        }
        .sales-search-icon {
            position:absolute;
            left:12px;
            font-size:13px;
            color:var(--muted);
            pointer-events:none;
        }
        .sales-search-input {
            width:100%;
            padding:11px 38px 11px 34px;
            background:var(--surface2);
            border:1px solid var(--border);
            border-radius:10px;
            color:var(--text);
            font-size:13px;
            font-family:inherit;
            outline:none;
            transition:border-color .15s;
        }
        .sales-search-input:focus {
            border-color:var(--accent);
        }
        .sales-search-input::placeholder { color:var(--muted); font-size:12px; }
        .sales-search-clear {
            position:absolute;
            right:8px;
            background:var(--border);
            color:var(--text);
            border:none;
            width:22px;
            height:22px;
            border-radius:50%;
            font-size:14px;
            line-height:1;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .mgmt-badge {
            font-family:'Bebas Neue',sans-serif;
            font-size:13px;
            letter-spacing:1px;
            padding:3px 8px;
            border-radius:6px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            color:#fff;
            white-space:nowrap;
            flex-shrink:0;
        }
        .sold-toggle-bar {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:10px 0 4px;
        }
        .sold-toggle-btn {
            background:var(--surface2);
            border:1px solid var(--border);
            border-radius:20px;
            color:var(--muted);
            font-family:'Noto Sans JP',sans-serif;
            font-size:11px;
            padding:5px 12px;
            cursor:pointer;
            transition:all 0.2s;
        }
        .sold-toggle-btn:hover { border-color:var(--success); color:var(--success); }
        .sold-count-label { font-size:11px; color:var(--muted); }

        .empty-state {
            text-align:center;
            padding:40px 20px;
            color:var(--muted);
            font-size:14px;
            line-height:2;
        }

        .empty-icon { font-size:40px; margin-bottom:10px; display:block; }

        .section-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:16px;
            padding:16px;
        }

        .section-title {
            font-size:10px;
            font-weight:700;
            letter-spacing:2px;
            color:var(--muted);
            text-transform:uppercase;
            margin-bottom:12px;
        }

        .info-banner {
            background:rgba(255,209,102,0.07);
            border:1px solid rgba(255,209,102,0.25);
            border-radius:12px;
            padding:12px 14px;
            font-size:12px;
            color:var(--warning);
            display:flex;
            align-items:flex-start;
            gap:10px;
            margin-bottom:10px;
        }

        .api-key-row {
            display:flex;
            gap:8px;
            margin-top:8px;
        }

        .api-key-input {
            flex:1;
            background:var(--surface2);
            border:1px solid var(--border);
            border-radius:7px;
            color:var(--text);
            font-family:'Noto Sans JP',sans-serif;
            font-size:12px;
            padding:7px 10px;
        }
        .api-key-input:focus { outline:none; border-color:var(--accent); }

        .gas-url-row { display:flex; gap:8px; margin-top:8px; }

        .gas-url-input {
            flex:1;
            background:var(--surface2);
            border:1px solid var(--border);
            border-radius:7px;
            color:var(--text);
            font-family:'Noto Sans JP',sans-serif;
            font-size:12px;
            padding:7px 10px;
        }
        .gas-url-input:focus { outline:none; border-color:var(--warning); }

        .save-btn {
            background:rgba(255,77,77,0.15);
            border:1px solid rgba(255,77,77,0.3);
            border-radius:7px;
            color:var(--accent);
            font-family:'Noto Sans JP',sans-serif;
            font-size:12px;
            padding:7px 12px;
            cursor:pointer;
            white-space:nowrap;
        }

        .gas-save-btn {
            background:rgba(255,209,102,0.15);
            border:1px solid rgba(255,209,102,0.3);
            border-radius:7px;
            color:var(--warning);
            font-family:'Noto Sans JP',sans-serif;
            font-size:12px;
            padding:7px 12px;
            cursor:pointer;
            white-space:nowrap;
        }
    </style>
</head>
<body>
    <header>
        <h1>MERCARI LISTER</h1>
        <span class="badge">AI</span>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('listing', this)">📦 出品</button>
        <button class="tab-btn" onclick="switchTab('sales', this)">📊 売上管理</button>
        <button class="tab-btn" onclick="switchTab('report', this)">📈 集計</button>
        <button class="tab-btn" onclick="switchTab('settings', this)">⚙️ 設定</button>
    </div>

    <div id="tab-listing" class="tab-panel active">
        <div class="main">
            <button class="add-product-btn" onclick="addProduct()">
                ＋ 商品を追加
            </button>

            <div id="errorMsg" class="error-msg"></div>

            <div id="productList"></div>

            <div id="progressWrap" class="progress-wrap">
                <div class="progress-label" id="progressLabel">生成中...</div>
                <div class="progress-bar-bg">
                    <div id="progressFill" class="progress-bar-fill"></div>
                </div>
            </div>

            <button id="bulkBtn" class="bulk-btn" onclick="generateAll()">
                <span id="bulkBtnText">✦ 全商品の出品文を一括生成</span>
            </button>
        </div>
    </div>

    <div id="tab-sales" class="tab-panel">
        <div class="main">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
                <h2 style="font-size:18px">📋 売上管理</h2>
                <button id="syncBtn" class="sync-btn" onclick="syncFromSheet(true)">🔄 更新</button>
            </div>
            <div id="salesControls"></div>
            <div id="listingList" class="listing-list"></div>
        </div>
    </div>

    <div id="tab-report" class="tab-panel">
        <div class="main">
            <h2 style="font-size:18px;margin-top:10px">📈 月別集計</h2>
            <div class="report-month-bar">
                <button class="report-nav-btn" onclick="changeReportMonth(-1)">◀</button>
                <span id="reportMonthLabel" class="report-month-label">—</span>
                <button class="report-nav-btn" onclick="changeReportMonth(1)">▶</button>
            </div>
            <div id="reportContent"></div>
        </div>
    </div>

    <div id="tab-settings" class="tab-panel">
        <div class="main">
            <div class="section-card">
                <div class="section-title">🤖 Anthropic API キー</div>
                <div class="info-banner">
                    🔑 <span>Anthropic の <a href="https://console.anthropic.com/" target="_blank" style="color:inherit">コンソール</a> でAPIキーを取得し、下に貼り付けてください。キーはこのデバイスにのみ保存されます。</span>
                </div>
                <div class="api-key-row">
                    <input type="password" id="apiKeyInput" class="api-key-input" placeholder="sk-ant-api03-...">
                    <button class="save-btn" onclick="saveApiKey()">保存</button>
                </div>
                <div id="apiKeyStatus" style="font-size:11px;color:var(--muted);margin-top:8px;"></div>
            </div>

            <div class="section-card">
                <div class="section-title">⚙️ GAS ウェブアプリ</div>
                <div class="info-banner" style="background:rgba(255,209,102,0.07);border-color:rgba(255,209,102,0.25);color:var(--warning)">
                    📌 セットアップ手順書を参照してURLを取得し、下に貼り付けてください。
                </div>
                <div class="gas-url-row">
                    <input type="text" id="gasUrlInput" class="gas-url-input" placeholder="https://script.google.com/macros/d/...">
                    <button class="gas-save-btn" onclick="saveGasUrl()">保存</button>
                </div>
                <div id="gasUrlStatus" style="font-size:11px;color:var(--muted);margin-top:8px;"></div>
            </div>

            <div class="section-card">
                <div class="section-title">📊 データ管理</div>
                <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">
                    ローカルに保存されている売上データをすべて削除します。スプレッドシートのデータは消えません。
                </p>
                <button class="sold-btn" onclick="clearAllData()" style="width:100%;background:rgba(255,77,77,0.15);color:var(--accent);border:1px solid rgba(255,77,77,0.3);">
                    ローカルデータをすべて削除
                </button>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let listings = JSON.parse(localStorage.getItem('mercari_listings') || '[]');
        let gasUrl = localStorage.getItem('mercari_gas_url') || '';
        let apiKey = localStorage.getItem('mercari_api_key') || '';
        let productCounter = 0;
        let showSoldItems = false;
        let salesSearchQuery = '';

        document.addEventListener('DOMContentLoaded', () => {
            if (gasUrl) document.getElementById('gasUrlInput').value = gasUrl;
            if (apiKey) {
                document.getElementById('apiKeyInput').value = apiKey;
                document.getElementById('apiKeyStatus').textContent = '✅ APIキーが設定されています';
                document.getElementById('apiKeyStatus').style.color = 'var(--success)';
            }
            addProduct();
            renderSalesList();
            syncFromSheet(false);
        });

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            btn.classList.add('active');
            if (tab === 'sales') renderSalesList();
            if (tab === 'report') renderReport();
        }

        function addProduct() {
            productCounter++;
            const id = 'p' + Date.now();
            products.push({ id, images: [], result: null });
            renderProductList();
            setTimeout(() => {
                const el = document.getElementById('card-' + id);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function removeProduct(id) {
            if (products.length <= 1) {
                alert('最低1商品は必要です');
                return;
            }
            products = products.filter(p => p.id !== id);
            renderProductList();
        }

        function toggleCard(id) {
            const body = document.getElementById('body-' + id);
            const chev = document.getElementById('chev-' + id);
            const isCollapsed = body.classList.contains('collapsed');
            body.classList.toggle('collapsed', !isCollapsed);
            chev.classList.toggle('open', isCollapsed);
        }

        function renderProductList() {
            const container = document.getElementById('productList');
            container.innerHTML = '';
            products.forEach((p, idx) => {
                const div = document.createElement('div');
                div.id = 'card-' + p.id;
                div.className = 'product-card' + (p.result ? ' done' : '');
                div.innerHTML = productCardHTML(p, idx);
                container.appendChild(div);
            });
        }

        function productCardHTML(p, idx) {
            const titlePreview = p.result ? p.result.title : '未生成';
            const isEmpty = !p.result;
            const statusClass = p.result ? 'ok' : 'idle';
            const statusLabel = p.result ? '生成済' : '未生成';
            return `
                <div class="card-header" onclick="toggleCard('${p.id}')">
                    <div class="card-header-left">
                        <div class="card-num">#${idx+1}</div>
                        <div class="card-title-preview ${isEmpty ? 'empty' : ''}">${titlePreview}</div>
                    </div>
                    <div class="card-header-right">
                        <span class="card-status ${statusClass}">${statusLabel}</span>
                        <span class="card-chevron open" id="chev-${p.id}">▼</span>
                        <button class="delete-card-btn" onclick="event.stopPropagation();removeProduct('${p.id}')">✕</button>
                    </div>
                </div>
                <div class="card-body" id="body-${p.id}">
                    <div class="upload-mini" id="upload-${p.id}" onclick="triggerUpload('${p.id}')">
                        <p><strong>タップして写真を追加</strong>（最大5枚）</p>
                        <input type="file" id="file-${p.id}" accept="image/*" multiple style="display:none" onchange="handleFiles('${p.id}', this.files)">
                        <div class="preview-grid" id="preview-${p.id}"></div>
                    </div>

                    <div class="form-grid-2">
                        <div class="fg">
                            <label>カテゴリ</label>
                            <select id="cat-${p.id}">
                                <option value="メンズトップス">メンズトップス</option>
                                <option value="メンズボトムス">メンズボトムス</option>
                                <option value="ジャージ上下セット">ジャージ上下セット</option>
                                <option value="ジャージ上">ジャージ上</option>
                                <option value="ジャージ下">ジャージ下</option>
                                <option value="アウター">アウター</option>
                                <option value="スウェット">スウェット</option>
                                <option value="Tシャツ">Tシャツ</option>
                                <option value="パーカー">パーカー</option>
                                <option value="シャツ">シャツ</option>
                                <option value="スニーカー">スニーカー</option>
                                <option value="バッグ">バッグ</option>
                                <option value="その他">その他</option>
                            </select>
                        </div>
                        <div class="fg">
                            <label>コンディション</label>
                            <select id="cond-${p.id}">
                                <option value="新品・未使用">新品・未使用</option>
                                <option value="未使用に近い">未使用に近い</option>
                                <option value="目立った傷や汚れなし" selected>目立った傷や汚れなし</option>
                                <option value="やや傷や汚れあり">やや傷や汚れあり</option>
                                <option value="傷や汚れあり">傷や汚れあり</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="fg">
                            <label>サイズ</label>
                            <select id="size-${p.id}">
                                <option value="">写真から推定</option>
                                <option value="XS">XS</option>
                                <option value="S">S</option>
                                <option value="M">M</option>
                                <option value="L">L</option>
                                <option value="XL">XL</option>
                                <option value="2XL">2XL</option>
                                <option value="3XL">3XL</option>
                            </select>
                        </div>
                        <div class="fg">
                            <label>ブランド（任意）</label>
                            <input type="text" id="brand-${p.id}" placeholder="例：NIKE">
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="fg">
                            <label>カラー（任意）</label>
                            <input type="text" id="color-${p.id}" placeholder="例：ネイビー">
                        </div>
                        <div class="fg">
                            <label>特記事項（任意）</label>
                            <input type="text" id="notes-${p.id}" placeholder="例：タグあり">
                        </div>
                    </div>

                    <div class="form-grid-3">
                        <div class="fg"><label>身幅(cm)</label><input type="text" id="width-${p.id}" placeholder="—"></div>
                        <div class="fg"><label>身丈(cm)</label><input type="text" id="length-${p.id}" placeholder="—"></div>
                        <div class="fg"><label>袖丈(cm)</label><input type="text" id="sleeve-${p.id}" placeholder="—"></div>
                    </div>

                    <div class="form-grid-2">
                        <div class="fg"><label>仕入れ値</label><div class="price-wrap"><span>¥</span><input type="number" id="cost-${p.id}" placeholder="0" min="0"></div></div>
                        <div class="fg"><label>予想売値</label><div class="price-wrap"><span>¥</span><input type="number" id="expected-${p.id}" placeholder="0" min="0"></div></div>
                    </div>

                    <div class="form-grid-2">
                        <div class="fg"><label>出品価格</label><div class="price-wrap"><span>¥</span><input type="number" id="price-${p.id}" placeholder="0" min="0"></div></div>
                        <div class="fg"><label>出品日</label><input type="text" id="date-${p.id}" placeholder="${todayStr()}" value="${todayStr()}"></div>
                    </div>

                    <div id="result-${p.id}">${p.result ? renderResult(p) : ''}</div>
                </div>
            `;
        }

        function renderResult(p) {
            const r = p.result;
            if (!r) return '';
            const tags = (r.hashtags || '').split(/\s+/).filter(t => t.startsWith('#'));
            const tagPills = tags.map(t => `<span class="tag-pill">${t}</span>`).join('');
            const charClass = r.title.length > 40 ? ' over' : '';
            return `
                <div class="result-area">
                    <div class="result-row">
                        <div class="result-row-header">
                            <span class="result-label">タイトル</span>
                            <div style="display:flex;align-items:center;gap:8px">
                                <span class="char-count${charClass}">${r.title.length}/40</span>
                                <button class="copy-xs" onclick="copyText(${JSON.stringify(r.title)}, this)">📋 コピー</button>
                            </div>
                        </div>
                        <div class="result-value">${r.title}</div>
                    </div>
                    <div class="result-row">
                        <div class="result-row-header">
                            <span class="result-label">商品説明文</span>
                            <button class="copy-xs" onclick="copyText(${JSON.stringify(r.description)}, this)">📋 コピー</button>
                        </div>
                        <div class="result-value">${r.description}</div>
                    </div>
                    <div class="result-row">
                        <div class="result-row-header">
                            <span class="result-label">ハッシュタグ</span>
                            <button class="copy-xs" onclick="copyText(${JSON.stringify(tags.join(' '))}, this)">📋 コピー</button>
                        </div>
                        <div class="hashtag-wrap">${tagPills}</div>
                    </div>
                </div>
                <div class="card-actions" style="margin-top:8px">
                    <button class="copy-all-xs" onclick="copyAll('${p.id}')">📋 説明文＋タグをコピー</button>
                    <button class="sheets-xs" id="sheets-${p.id}" onclick="sendToSheets('${p.id}')">📊 スプレッドシートへ</button>
                </div>
            `;
        }

        function triggerUpload(id) {
            document.getElementById('file-' + id).click();
        }

        function handleFiles(id, files) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            const remaining = 5 - p.images.length;
            const supported = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            const allFiles = Array.from(files);
            const unsupported = allFiles.filter(f => !supported.includes(f.type));
            if (unsupported.length > 0) {
                alert('⚠️ HEIC/HEIFなどの形式には対応していません。\n写真アプリで「JPEGとしてエクスポート」するか、Macの場合はプレビューで開いてJPEG形式で書き出してください。');
            }
            const toAdd = allFiles.filter(f => supported.includes(f.type)).slice(0, remaining);
            let loaded = 0;
            toAdd.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    p.images.push({ base64: e.target.result, type: file.type });
                    loaded++;
                    if (loaded === toAdd.length) renderPreview(id);
                };
                reader.readAsDataURL(file);
            });
        }

        function renderPreview(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            const grid = document.getElementById('preview-' + id);
            if (!grid) return;
            grid.innerHTML = p.images.map((img, i) => `
                <div class="preview-item">
                    <img src="${img.base64}" alt="">
                    <button class="remove-btn" onclick="event.stopPropagation();removeImg('${id}',${i})">✕</button>
                </div>
            `).join('');
        }

        function removeImg(id, idx) {
            const p = products.find(x => x.id === id);
            if (p) {
                p.images.splice(idx, 1);
                renderPreview(id);
            }
        }

        async function generateAll() {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';

            if (!apiKey) {
                errorMsg.textContent = '🔑 APIキーが未設定です。「設定」タブでAnthropicのAPIキーを入力してください。';
                errorMsg.style.display = 'block';
                return;
            }

            const toGenerate = products.filter(p => p.images.length > 0);
            if (toGenerate.length === 0) {
                errorMsg.textContent = '📸 少なくとも1商品に写真を追加してください';
                errorMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('bulkBtn');
            const btnText = document.getElementById('bulkBtnText');
            const progressWrap = document.getElementById('progressWrap');
            const progressFill = document.getElementById('progressFill');
            const progressLabel = document.getElementById('progressLabel');
            btn.disabled = true;
            progressWrap.style.display = 'block';
            let done = 0;
            for (const p of toGenerate) {
                progressLabel.textContent = `生成中... ${done + 1} / ${toGenerate.length} 商品`;
                progressFill.style.width = `${(done / toGenerate.length) * 100}%`;
                const card = document.getElementById('card-' + p.id);
                if (card) card.className = 'product-card generating';
                const resultEl = document.getElementById('result-' + p.id);
                if (resultEl) resultEl.innerHTML = `<div class="gen-spinner"><div class="spin"></div>出品文を生成中...</div>`;
                await generateOne(p);
                done++;
                if (card) card.className = 'product-card done';
                updateCardResult(p);
            }
            progressFill.style.width = '100%';
            progressLabel.textContent = `✅ ${done}商品の生成が完了しました！`;
            btn.disabled = false;
            btnText.textContent = '✦ 全商品の出品文を一括生成';
        }

        async function generateOne(p) {
            const id = p.id;
            const category = document.getElementById('cat-' + id)?.value || 'メンズトップス';
            const condition = document.getElementById('cond-' + id)?.value || '目立った傷や汚れなし';
            const size = document.getElementById('size-' + id)?.value || '';
            const brand = document.getElementById('brand-' + id)?.value || '';
            const color = document.getElementById('color-' + id)?.value || '';
            const notes = document.getElementById('notes-' + id)?.value || '';
            const width = document.getElementById('width-' + id)?.value || '';
            const bodyLen = document.getElementById('length-' + id)?.value || '';
            const sleeve = document.getElementById('sleeve-' + id)?.value || '';
            const hasMeasure = width || bodyLen || sleeve;
            const measureLine = hasMeasure
                ? `身幅　${width||'—'}cm\n身丈　${bodyLen||'—'}cm\n袖丈　${sleeve||'—'}cm\n※素人採寸のため多少の誤差はご了承くださいませ。`
                : '（採寸なし）';

            const imageContents = p.images.map(img => ({
                type: 'image',
                source: {
                    type: 'base64',
                    media_type: img.type,
                    data: img.base64.split(',')[1]
                }
            }));

            const prompt = `あなたはメルカリで古着・スポーツウェアを大量出品しているプロセラーです。画像と情報をもとに、売れやすいメルカリ出品データをJSONで返してください。

【商品情報】
カテゴリ: ${category}
コンディション: ${condition}
サイズ: ${size || '画像から判断'}
ブランド: ${brand || '画像から読み取る（不明なら「ブランド記載なし」）'}
カラー: ${color || '画像から読み取る'}
採寸: ${hasMeasure ? `身幅${width||'—'}cm/身丈${bodyLen||'—'}cm/袖丈${sleeve||'—'}cm` : 'なし'}
特記事項: ${notes || 'なし'}

【出力ルール】
- JSONのみ返す。Markdownや説明文は不要。
- titleは40文字以内。ブランド・カテゴリ・色・サイズを入れて検索されやすく。
- descriptionは下記テンプレートを厳守。
- hashtagsは#から始まるタグ10〜15個をスペース区切り。

【descriptionテンプレート・厳守】
◆商品説明
{商品の特徴・状態・おすすめポイントを2〜3文}

◆ブランド
{ブランド名}

◆カラー
{カラー}

◆サイズ
{サイズ表記}
${measureLine}

◆コンディション
{コンディションを自然な文章で}
※古着という点は予めご理解くださいませ。

{"title":"...","description":"...","hashtags":"..."}`;

            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-5',
                        max_tokens: 1200,
                        messages: [{
                            role: 'user',
                            content: [...imageContents, { type: 'text', text: prompt }]
                        }]
                    })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                const raw = data.content.map(i => i.text || '').join('');
                const match = raw.replace(/```json|```/g, '').match(/\{[\s\S]*\}/);
                if (!match) throw new Error('JSONの解析に失敗しました');
                p.result = JSON.parse(match[0]);
            } catch(e) {
                p.result = { title: '生成失敗', description: 'エラー: ' + e.message, hashtags: '' };
                console.error(e);
            }
        }

        function updateCardResult(p) {
            const cardEl = document.getElementById('card-' + p.id);
            if (!cardEl) return;
            const preview = cardEl.querySelector('.card-title-preview');
            if (preview) {
                preview.textContent = p.result?.title || '生成失敗';
                preview.classList.remove('empty');
            }
            const statusEl = cardEl.querySelector('.card-status');
            if (statusEl) {
                statusEl.textContent = '生成済';
                statusEl.className = 'card-status ok';
            }
            const resultEl = document.getElementById('result-' + p.id);
            if (resultEl) resultEl.innerHTML = renderResult(p);
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.textContent;
                btn.textContent = '✅ コピー済';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function copyAll(id) {
            const p = products.find(x => x.id === id);
            if (!p?.result) return;
            const tags = (p.result.hashtags || '').split(/\s+/).filter(t => t.startsWith('#'));
            const text = p.result.description + '\n\n' + tags.join(' ');
            const btn = event.currentTarget;
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.textContent;
                btn.textContent = '✅ コピーしました！';
                setTimeout(() => btn.textContent = orig, 2200);
            });
        }

        async function sendToSheets(id) {
            const p = products.find(x => x.id === id);
            if (!p?.result) return;
            const btn = document.getElementById('sheets-' + id);
            const thumbnail = p.images[0]?.base64 ? await makeThumb(p.images[0].base64) : '';
            const newListing = {
                managementNumber: nextManagementNumber(),
                id: Date.now().toString(),
                thumbnail,
                title: p.result.title,
                costPrice: parseInt(document.getElementById('cost-' + id)?.value) || 0,
                expectedPrice: parseInt(document.getElementById('expected-' + id)?.value) || 0,
                listingPrice: parseInt(document.getElementById('price-' + id)?.value) || 0,
                listingDate: document.getElementById('date-' + id)?.value || todayStr(),
                usePromo: false,
                status: 'selling',
                soldPrice: null,
                soldDate: null,
                shippingCost: null,
                fee: null,
                netSales: null,
                grossProfit: null,
                profit: null,
                priceDiff: null,
                daysToSell: null
            };
            listings.push(newListing);
            saveListing();
            if (btn) { btn.disabled = true; btn.textContent = '転記中...'; }
            if (gasUrl) {
                try {
                    const { thumbnail: _omit, ...gasData } = newListing;
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'addListing', data: gasData }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                } catch(e) {
                    console.warn(e);
                }
            }
            if (btn) { btn.textContent = '✅ 転記済'; btn.disabled = true; }
            if (!gasUrl) alert('⚠️ GAS URLが未設定です。「設定」タブでURLを設定するとスプレッドシートにも書き込まれます。\nローカルへの保存は完了しました。');
        }

        function renderSalesList() {
            const el = document.getElementById('listingList');
            const controls = document.getElementById('salesControls');
            if (!el) return;
            if (controls) controls.innerHTML = '';
            if (listings.length === 0) {
                el.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="empty-icon">📦</span>出品データがありません。<br>「出品」タブで出品文を生成し、<br>スプレッドシートに転記してください。</div>`;
                return;
            }
            const selling = listings.filter(l => l.status !== 'sold');
            const sold = listings.filter(l => l.status === 'sold');
            let visibleList = showSoldItems ? listings.slice().reverse() : selling.slice().reverse();
            const q = salesSearchQuery.trim().toLowerCase();
            if (q) {
                const qNorm = q.replace(/^#/, '');
                visibleList = visibleList.filter(l =>
                    String(l.managementNumber || '').toLowerCase().includes(qNorm) ||
                    String(l.title || '').toLowerCase().includes(q)
                );
            }
            const toggleLabel = showSoldItems ? `売れた商品を隠す` : `売れた商品を表示 (${sold.length}件)`;
            const toggleHTML = sold.length > 0 ? `
                <div class="sold-toggle-bar">
                    <span class="sold-count-label">出品中: ${selling.length}件</span>
                    <button class="sold-toggle-btn" onclick="toggleSoldView()">${toggleLabel}</button>
                </div>
            ` : `<div class="sold-toggle-bar"><span class="sold-count-label">出品中: ${selling.length}件</span></div>`;
            const searchHTML = `
                <div class="sales-search-bar">
                    <span class="sales-search-icon">🔍</span>
                    <input type="text" id="salesSearchInput" class="sales-search-input" placeholder="管理番号 or 商品名で検索（例: 001 / Tシャツ）" value="${salesSearchQuery.replace(/"/g,'&quot;')}" oninput="onSalesSearch(this.value)">
                    ${salesSearchQuery ? '<button class="sales-search-clear" onclick="clearSalesSearch()">×</button>' : ''}
                </div>
            `;
            const cardsHTML = visibleList.length === 0
                ? (q
                    ? `<div class="empty-state" style="grid-column:1/-1"><span class="empty-icon">🔎</span>「${salesSearchQuery}」に一致する商品はありません。</div>`
                    : `<div class="empty-state" style="grid-column:1/-1"><span class="empty-icon">✅</span>出品中の商品はありません。</div>`)
                : visibleList.map(l => listingCardHTML(l)).join('');
            if (controls) controls.innerHTML = searchHTML + toggleHTML;
            el.innerHTML = cardsHTML;
            const input = document.getElementById('salesSearchInput');
            if (input && document.activeElement !== input && salesSearchQuery) {
                input.focus();
                input.setSelectionRange(input.value.length, input.value.length);
            }
        }

        function onSalesSearch(val) {
            salesSearchQuery = val;
            renderSalesList();
        }

        function clearSalesSearch() {
            salesSearchQuery = '';
            renderSalesList();
        }

        function toggleSoldView() {
            showSoldItems = !showSoldItems;
            renderSalesList();
        }

        function listingCardHTML(l) {
            const isSold = l.status === 'sold';
            const thumbHTML = l.thumbnail
                ? `<img class="lc-thumb" src="${l.thumbnail}" alt="${(l.title||'').replace(/"/g,'&quot;')}" loading="lazy">`
                : `<div class="lc-thumb-placeholder">📦</div>`;
            return `
                <div class="listing-card">
                    ${thumbHTML}
                    <div class="lc-header">
                        ${l.managementNumber ? `<span class="mgmt-badge">#${l.managementNumber}</span>` : ''}
                        <div class="lc-title">${l.title}</div>
                        <span class="status-badge ${isSold ? 'status-sold' : 'status-selling'}">${isSold ? '売れた' : '出品中'}</span>
                        ${l.usePromo ? '<span class="status-badge" style="background:rgba(255,140,66,0.15);color:var(--accent2);border:1px solid rgba(255,140,66,0.3)">プロモ</span>' : ''}
                    </div>
                    <div class="lc-body">
                        <div class="info-grid">
                            <div class="ic"><div class="ic-label">仕入れ値</div><div class="ic-value">¥${num(l.costPrice)}</div></div>
                            <div class="ic"><div class="ic-label">予想売値</div><div class="ic-value">¥${num(l.expectedPrice)}</div></div>
                            <div class="ic"><div class="ic-label">出品価格</div><div class="ic-value">¥${num(l.listingPrice)}</div></div>
                            <div class="ic"><div class="ic-label">出品日</div><div class="ic-value" style="font-size:12px">${l.listingDate}</div></div>
                            ${isSold ? `
                                <div class="ic"><div class="ic-label">販売価格</div><div class="ic-value">¥${num(l.soldPrice)}</div></div>
                                <div class="ic"><div class="ic-label">手数料(${l.usePromo?'15%🔥':'10%'})</div><div class="ic-value" style="color:var(--muted)">-¥${num(l.fee)}</div></div>
                            ` : '<div></div><div></div>'}
                        </div>
                        ${isSold ? `
                            <div class="sold-result-grid">
                                <div class="ic"><div class="ic-label">送料</div><div class="ic-value" style="color:var(--muted)">-¥${num(l.shippingCost||0)}</div></div>
                                <div class="ic"><div class="ic-label">販売手残り</div><div class="ic-value ${(l.netSales||l.profit)>=0?'pos':'neg'}">¥${num(l.netSales!=null?l.netSales:l.profit)}</div></div>
                                <div class="ic"><div class="ic-label">粗利</div><div class="ic-value ${(l.grossProfit!=null?l.grossProfit:l.profit)>=0?'pos':'neg'}">¥${num(l.grossProfit!=null?l.grossProfit:l.profit)}</div></div>
                                <div class="ic"><div class="ic-label">予想との差</div><div class="ic-value ${l.priceDiff>=0?'pos':'neg'}">${l.priceDiff>=0?'+':''}¥${num(l.priceDiff)}</div></div>
                                <div class="ic"><div class="ic-label">販売日</div><div class="ic-value" style="font-size:12px">${l.soldDate}</div></div>
                                <div class="ic"><div class="ic-label">売れるまで</div><div class="ic-value">${l.daysToSell}日</div></div>
                            </div>
                        ` : `
                            <div class="sold-section">
                                <div class="sold-title">売れたら入力</div>
                                <div class="sold-row">
                                    <div class="sold-input-w">
                                        <label>実際の売値</label>
                                        <div class="price-wrap"><span>¥</span><input type="number" id="sold-${l.id}" placeholder="0" min="0" style="padding-left:22px"></div>
                                    </div>
                                    <div class="sold-input-w">
                                        <label>送料</label>
                                        <div class="price-wrap"><span>¥</span><input type="number" id="shipping-${l.id}" placeholder="0" min="0" style="padding-left:22px"></div>
                                    </div>
                                    <button class="sold-btn" onclick="markSold('${l.id}')">✓ 売れた</button>
                                </div>
                                <div style="margin-top:8px;display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer" onclick="document.getElementById('promo-${l.id}').click()">
                                    <input type="checkbox" id="promo-${l.id}" style="width:15px;height:15px;accent-color:var(--accent2);cursor:pointer;flex-shrink:0">
                                    <div><div style="font-size:12px;font-weight:500">プロモーション利用</div><div style="font-size:10px;color:var(--muted)">手数料+5%（合計15%）</div></div>
                                </div>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function markSold(id) {
            const soldPrice = parseInt(document.getElementById('sold-' + id)?.value);
            if (!soldPrice || soldPrice <= 0) { alert('売値を入力してください'); return; }
            const shippingCost = parseInt(document.getElementById('shipping-' + id)?.value) || 0;
            const usePromo = document.getElementById('promo-' + id)?.checked || false;
            const idx = listings.findIndex(l => l.id === id);
            if (idx === -1) return;
            const l = listings[idx];
            const baseFee = Math.floor(soldPrice * 0.10);
            const promoFee = usePromo ? Math.floor(soldPrice * 0.05) : 0;
            const fee = baseFee + promoFee;
            const netSales = soldPrice - fee - shippingCost;
            const grossProfit = netSales - l.costPrice;
            const priceDiff = soldPrice - l.expectedPrice;
            const soldDate = todayStr();
            const daysToSell = calcDays(l.listingDate, soldDate);
            listings[idx] = { ...l, status:'sold', soldPrice, soldDate, shippingCost, fee, netSales, grossProfit, profit: grossProfit, priceDiff, daysToSell, usePromo };
            saveListing();
            if (gasUrl) {
                fetch(gasUrl, {
                    method:'POST',
                    mode:'no-cors',
                    body: JSON.stringify({ action:'updateSold', data: listings[idx] }),
                    headers:{'Content-Type':'application/json'}
                }).catch(()=>{});
            }
            renderSalesList();
        }

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if (!val.startsWith('sk-ant-')) {
                document.getElementById('apiKeyStatus').textContent = '⚠️ 正しいAnthropicのAPIキーを入力してください（sk-ant- で始まります）';
                document.getElementById('apiKeyStatus').style.color = '#ff8080';
                return;
            }
            apiKey = val;
            localStorage.setItem('mercari_api_key', apiKey);
            document.getElementById('apiKeyStatus').textContent = '✅ 保存しました';
            document.getElementById('apiKeyStatus').style.color = 'var(--success)';
        }

        function saveGasUrl() {
            const val = document.getElementById('gasUrlInput').value.trim();
            if (!val.startsWith('https://script.google.com')) {
                document.getElementById('gasUrlStatus').textContent = '⚠️ 正しいGAS URLを入力してください';
                document.getElementById('gasUrlStatus').style.color = '#ff8080';
                return;
            }
            gasUrl = val;
            localStorage.setItem('mercari_gas_url', gasUrl);
            document.getElementById('gasUrlStatus').textContent = '✅ 保存しました';
            document.getElementById('gasUrlStatus').style.color = 'var(--success)';
        }

        function saveListing() {
            try {
                localStorage.setItem('mercari_listings', JSON.stringify(listings));
            } catch (e) {
                alert('⚠️ 保存容量の上限に達した可能性があります。古いデータを整理してください。');
                console.error(e);
            }
        }

        let reportDate = new Date();
        reportDate.setDate(1);

        function changeReportMonth(delta) {
            reportDate.setMonth(reportDate.getMonth() + delta);
            renderReport();
        }

        function ymKey(dateStr) {
            // "YYYY/MM/DD" -> "YYYY/MM"
            if (!dateStr) return '';
            const m = String(dateStr).match(/(\d{4})\/(\d{1,2})/);
            return m ? `${m[1]}/${String(m[2]).padStart(2,'0')}` : '';
        }

        function monthEnd(d) {
            return new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);
        }

        function parseDate(str) {
            if (!str) return null;
            const m = String(str).match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
            return m ? new Date(+m[1], +m[2] - 1, +m[3]) : null;
        }

        function renderReport() {
            const label = document.getElementById('reportMonthLabel');
            const content = document.getElementById('reportContent');
            if (!label || !content) return;

            const y = reportDate.getFullYear();
            const mo = reportDate.getMonth() + 1;
            const key = `${y}/${String(mo).padStart(2,'0')}`;
            label.textContent = `${y}.${String(mo).padStart(2,'0')}`;

            const mEnd = monthEnd(reportDate);

            // 月内に出品したもの
            const listedThisMonth = listings.filter(l => ymKey(l.listingDate) === key);
            // 月内に売れたもの
            const soldThisMonth = listings.filter(l => l.status === 'sold' && ymKey(l.soldDate) === key);

            const salesAmount = soldThisMonth.reduce((s,l) => s + (l.soldPrice||0), 0);
            const profitSum = soldThisMonth.reduce((s,l) => s + (l.grossProfit != null ? l.grossProfit : (l.profit||0)), 0);

            // 月末時点の在庫数（その月末までに出品し、その月末までに売れていないもの）
            const stockCount = listings.filter(l => {
                const ld = parseDate(l.listingDate);
                if (!ld || ld > mEnd) return false;
                if (l.status === 'sold') {
                    const sd = parseDate(l.soldDate);
                    if (sd && sd <= mEnd) return false;
                }
                return true;
            }).length;

            const soldCount = soldThisMonth.length;
            const avgSale = soldCount ? Math.round(salesAmount / soldCount) : 0;
            const avgProfit = soldCount ? Math.round(profitSum / soldCount) : 0;

            content.innerHTML = `
                <div class="stat-grid">
                    <div class="stat-card highlight">
                        <span class="stat-label">利益（売上−手数料−送料−仕入れ）</span>
                        <span class="stat-value ${profitSum>=0?'pos':'neg'}">¥${num(profitSum)}</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">出品数</span>
                        <span class="stat-value">${listedThisMonth.length}<span class="stat-unit">件</span></span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">販売数</span>
                        <span class="stat-value">${soldCount}<span class="stat-unit">件</span></span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">販売額</span>
                        <span class="stat-value">¥${num(salesAmount)}</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">在庫数（月末時点）</span>
                        <span class="stat-value">${stockCount}<span class="stat-unit">件</span></span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">平均販売額</span>
                        <span class="stat-value">¥${num(avgSale)}</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">平均利益額（1点）</span>
                        <span class="stat-value ${avgProfit>=0?'pos':'neg'}">¥${num(avgProfit)}</span>
                    </div>
                </div>
                ${soldCount === 0 && listedThisMonth.length === 0
                    ? '<div class="empty-state"><span class="empty-icon">🗓</span>この月の出品・販売データはありません。</div>'
                    : ''}
            `;
        }

        function num(n) { return (n||0).toLocaleString(); }

        // スプレッドシートから全データを読み込む（JSONPでCORS回避）
        function fetchSheetListings() {
            return new Promise((resolve) => {
                if (!gasUrl) { resolve(null); return; }
                const cb = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random()*1000);
                const script = document.createElement('script');
                let done = false;
                const cleanup = () => { try { delete window[cb]; } catch(e){ window[cb] = undefined; } script.remove(); };
                window[cb] = (data) => { done = true; cleanup(); resolve(data); };
                script.onerror = () => { if (!done) { cleanup(); resolve(null); } };
                script.src = gasUrl + (gasUrl.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + cb + '&t=' + Date.now();
                document.body.appendChild(script);
                setTimeout(() => { if (!done) { cleanup(); resolve(null); } }, 15000);
            });
        }

        async function syncFromSheet(showFeedback) {
            const btn = document.getElementById('syncBtn');
            if (btn && showFeedback) { btn.disabled = true; btn.textContent = '🔄 同期中...'; }
            const data = await fetchSheetListings();
            if (!data || data.status !== 'ok' || !Array.isArray(data.listings)) {
                if (btn && showFeedback) { btn.disabled = false; btn.textContent = '🔄 更新'; }
                if (showFeedback) alert('⚠️ スプレッドシートから読み込めませんでした。\nGASの再デプロイ（doGet追加）がお済みか、設定タブのURLが正しいかご確認ください。');
                return false;
            }
            // ローカルに保存している写真サムネは管理番号で引き継ぐ
            const thumbByMn = {};
            listings.forEach(l => { if (l.thumbnail) thumbByMn[l.managementNumber] = l.thumbnail; });
            listings = data.listings.map(l => ({ ...l, thumbnail: thumbByMn[l.managementNumber] || '' }));
            saveListing();
            renderSalesList();
            if (btn) { btn.disabled = false; btn.textContent = '🔄 更新'; }
            return true;
        }

        function makeThumb(dataUrl, max = 240) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    const scale = Math.min(1, max / Math.max(img.width, img.height));
                    const w = Math.round(img.width * scale);
                    const h = Math.round(img.height * scale);
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    try { resolve(canvas.toDataURL('image/jpeg', 0.7)); }
                    catch { resolve(dataUrl); }
                };
                img.onerror = () => resolve('');
                img.src = dataUrl;
            });
        }

        function nextManagementNumber() {
            const max = listings.reduce((m, l) => {
                const n = parseInt(l.managementNumber, 10);
                return isNaN(n) ? m : Math.max(m, n);
            }, 0);
            return String(max + 1).padStart(3, '0');
        }

        function todayStr() {
            const d = new Date();
            return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
        }

        function calcDays(from, to) {
            try {
                return Math.round((new Date(to.replace(/\//g,'-')) - new Date(from.replace(/\//g,'-'))) / 86400000);
            } catch { return '—'; }
        }

        function clearAllData() {
            if (confirm('売上データをすべて削除しますか？')) {
                listings = [];
                saveListing();
                renderSalesList();
            }
        }
    </script>
</body>
</html>
